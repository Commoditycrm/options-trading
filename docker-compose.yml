services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_app"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis Streams + Consumer Groups for the copy-trade fan-out queue.
  # NOT pub/sub — Streams give us one-message-per-worker semantics so
  # multiple worker processes can share the work without duplicates.
  # Local dev defaults to running a worker inside the FastAPI process
  # (RUN_FANOUT_WORKER_IN_PROCESS=true in .env); production runs the
  # worker as a separate Render service.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
