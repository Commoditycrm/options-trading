# Production stack for a single self-hosted host (e.g. AWS Lightsail).
#
# Security model
# --------------
# - Only Caddy publishes ports (80/443). Postgres and Redis have NO `ports:`
#   mapping, so they are reachable ONLY on the private `internal` Docker
#   network by service name — never from the public internet.
# - Redis requires a password (`--requirepass`); Postgres uses a strong
#   password. Both come from the gitignored `.env` file (see .env.prod.example).
# - Backend/worker/frontend are not published either; Caddy reverse-proxies to
#   them over the internal network and terminates TLS.
#
# Bring up:   docker compose -f docker-compose.prod.yml up -d --build
# Logs:       docker compose -f docker-compose.prod.yml logs -f
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    # NB: deliberately NO `ports:` — the DB is internal-only.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # requirepass closes the unauthenticated-Redis RCE hole; AOF on for
    # durability of the fanout stream across restarts.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      # Expose the password inside the container so the healthcheck's
      # in-container shell can read it ($$ defers expansion to the container).
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    # NB: deliberately NO `ports:` — Redis is internal-only.

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Wire the app to the internal services. The app normalizes the
      # postgresql:// scheme to psycopg itself (see app/database.py).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Dedicated `worker` service handles fanout — don't double-consume.
      RUN_FANOUT_WORKER_IN_PROCESS: "false"
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["python", "worker.py"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RUN_FANOUT_WORKER_IN_PROCESS: "false"
    depends_on:
      backend: {condition: service_healthy}
    networks: [internal]

  frontend:
    build:
      context: ./frontend
      args:
        # Browser SSE client hits the same public origin; Caddy routes
        # /api/* straight to the backend (bypassing the Next proxy so long
        # SSE streams aren't cut off).
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_URL}
    restart: unless-stopped
    environment:
      # Server-side Next rewrite fallback for /api/* (SSR). Caddy handles
      # /api/* directly in normal operation.
      BACKEND_URL: http://backend:8000
    depends_on:
      backend: {condition: service_healthy}
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
