# Render blueprint for the SignalBoxx backend.
#
# Frontend stays on Vercel (deployed via the existing vercel.json). This file
# only provisions the FastAPI backend + Postgres on Render.
#
# Why Render instead of Vercel for the backend
# --------------------------------------------
# The backend holds long-lived state that serverless can't host: one Alpaca
# (and soon IBKR) WebSocket per connected broker for live order/fill push,
# plus per-user SSE streams for the frontend. Render runs the FastAPI process
# as a long-running container — same shape it'll have on ECS/Fargate later.
#
# First-time setup
# ----------------
# 1. From the Render dashboard → New → Blueprint, point at this repo.
# 2. CREDENTIAL_ENCRYPTION_KEY must be set manually after the service is
#    created. Generate locally:
#        python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#    Then add it via Render dashboard → Environment.
#    DO NOT use Render's generateValue for this — Fernet needs a specific
#    32-byte url-safe base64 format, not arbitrary random.
# 3. CORS_ORIGINS and FRONTEND_BASE_URL default to the Vercel frontend URL
#    below — change if your Vercel project name differs.
#
# After AWS migration
# -------------------
# This file becomes irrelevant. The same uvicorn command in the startCommand
# below runs unchanged on ECS / Fargate / App Runner / EC2.

services:
  - type: web
    name: signalboxx-backend
    runtime: python
    plan: free            # bump to "starter" ($7/mo) for always-on — free tier
                          # spins down after 15min idle, dropping the Alpaca
                          # trade-update WebSocket. Fine for dev; not for prod.
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Migrations run inline at startup. Ideally this would be a
    # preDeployCommand (cleaner: web service only starts AFTER migrations
    # succeed), but Render's free tier doesn't support preDeployCommand.
    # Workaround: alembic + uvicorn chained in startCommand — if alembic
    # fails, uvicorn never starts and the service shows as failed (same
    # net effect). When you upgrade to Starter, move alembic back into
    # preDeployCommand for cleaner separation.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: signalboxx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # 256-bit random base64; safe for HS256
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_DAYS
        value: "14"
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false                # MUST be set manually via dashboard
                                   # (see "First-time setup" above)
      # NOTE: App 2 (Option Haven) deploys to Lightsail via
      # docker-compose.demo.yml, which sets these from PUBLIC_URL. This
      # render.yaml is unused for that path — set to App 2's own public URL
      # only if you ever deploy this app on Render. Do NOT point at App 1.
      - key: CORS_ORIGINS
        value: https://YOUR_OPTIONS_TRADING_PUBLIC_URL
      - key: FRONTEND_BASE_URL
        value: https://YOUR_OPTIONS_TRADING_PUBLIC_URL
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Redis Streams for parallel copy-trade fan-out. See doc/DEPLOY.md
      # for Upstash free-tier setup. Leave blank to fall back to the
      # in-process ThreadPoolExecutor dispatch (fine for single-trader,
      # <50 subscribers; won't scale beyond one pod).
      - key: REDIS_URL
        sync: false                # set manually via dashboard
      # When True, the FastAPI process also runs a fanout worker as an
      # asyncio task. Cheaper (no second Render service) but caps the
      # worker pool at one instance. Flip to False once you spin up the
      # dedicated worker service below.
      - key: RUN_FANOUT_WORKER_IN_PROCESS
        value: "true"

  # ── Optional: dedicated fanout worker ────────────────────────────────
  # Uncomment this block to scale fanout independently of the backend.
  # Worker services on Render start at $7/mo (no free tier for workers,
  # unlike web services). Keeps the backend free for HTTP/SSE traffic
  # and lets you bump worker count under load.
  #
  # Before enabling: set RUN_FANOUT_WORKER_IN_PROCESS=false on the
  # backend (above) so you don't run two consumer instances by accident.
  #
  # - type: worker
  #   name: signalboxx-fanout-worker
  #   runtime: python
  #   plan: starter
  #   rootDir: backend
  #   buildCommand: pip install -r requirements.txt
  #   startCommand: python worker.py
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: signalboxx-db
  #         property: connectionString
  #     - key: CREDENTIAL_ENCRYPTION_KEY
  #       sync: false
  #     - key: REDIS_URL
  #       sync: false
  #     - key: PYTHON_VERSION
  #       value: "3.11.9"

databases:
  - name: signalboxx-db
    plan: free               # 1GB, 90-day expiry on free tier — fine for dev,
                             # upgrade to "starter" before going live.
    databaseName: signalboxx
    user: signalboxx
