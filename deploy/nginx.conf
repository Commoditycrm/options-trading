# Reverse proxy for the queue-demo single-box deployment.
#
#   /api/*  -> backend:8000   (FastAPI; SSE buffering OFF)
#   /*      -> frontend:3000  (Next.js)
#
# Start HTTP-only. After you run certbot (see deploy guide) and have certs in
# deploy/certs/, uncomment the 443 server block and the redirect.

upstream demo_backend  { server backend:8000; }
upstream demo_frontend { server frontend:3000; }

server {
    listen 80;
    server_name _;

    # ---- API + SSE ----------------------------------------------------------
    location /api/ {
        proxy_pass http://demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for Server-Sent Events: disable buffering + keep the
        # connection open so order.copy_submitted events stream live.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Next.js frontend ---------------------------------------------------
    location / {
        proxy_pass http://demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR / upgrade headers (harmless in prod).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

